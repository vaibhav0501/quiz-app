<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App Pro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="quiz-card">
  <div class="setup-screen">
    <h1 class="setup-title">Quiz App Pro</h1>
    <p class="setup-subtitle">Choose your settings to begin</p>

    <div class="field-group">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Loading categories...</option>
      </select>
    </div>

    <div class="field-group">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div class="field-group">
      <label for="amount">Number of Questions: <span id="amount-value">10</span></label>
      <input type="range" id="amount" min="5" max="20" value="10">
    </div>

    <button id="start-btn">Start Quiz</button>
    <p class="setup-error hidden" id="setup-error">Couldn't load categories. Check your connection and try again.</p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/setup.js"></script>
</body>
</html>
