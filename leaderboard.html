<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App Pro</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<button id="theme-toggle-btn" class="theme-toggle" aria-label="Switch to dark theme">🌙</button>

<div class="quiz-card review-card">
  <div class="leaderboard-screen">
    <h2>Leaderboard</h2>
    <p class="leaderboard-empty hidden" id="leaderboard-empty">No scores saved yet — play a quiz and save your score!</p>
    <ol id="leaderboard-list" class="leaderboard-list"></ol>
    <button id="leaderboard-back-btn">Back to Setup</button>
  </div>
</div>

<script src="js/leaderboard.js"></script>
</body>
</html>
